services:
  frontend:
    image: ghcr.io/guizmo-silva/markdown-editor-frontend:latest
    container_name: markdown-editor-frontend
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - markdown-editor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    image: ghcr.io/guizmo-silva/markdown-editor-backend:latest
    container_name: markdown-editor-backend
    ports:
      # Bind apenas ao loopback: o backend NÃO fica acessível na rede/internet.
      # O frontend acessa o backend via rede Docker interna; a porta 3011
      # fica disponível somente em localhost para debug local se necessário.
      - "127.0.0.1:3011:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUID=1000
      - PGID=1000
      - WORKSPACE_ROOT=/workspace
      # Se usar Cloudflare Tunnel ou outro túnel, defina a URL do frontend aqui
      # para restringir o CORS apenas à origem correta:
      # - ALLOWED_ORIGIN=https://seu-tunel.trycloudflare.com
      # Volumes adicionais além do workspace principal
      # Formato: nome1:/caminho1,nome2:/caminho2
      # Exemplo: EXTRA_VOLUMES=documentos:/docs,projetos:/projetos
    volumes:
      # Configure aqui as pastas que o editor terá acesso
      # Apenas pastas explicitamente mapeadas ficam acessíveis
      - /caminho/para/seus/arquivos:/workspace
      # Volumes adicionais (devem coincidir com EXTRA_VOLUMES):
      # - /outro/caminho:/docs
    restart: unless-stopped
    networks:
      - markdown-editor
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  markdown-editor:
    driver: bridge
