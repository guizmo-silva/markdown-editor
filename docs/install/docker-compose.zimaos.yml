# Docker Compose para ZimaOS
# Caminho padrão de dados: /DATA/AppData/mkd/workspace
#
# Uso: docker-compose -f docker-compose.zimaos.yml up -d

services:
  frontend:
    image: ghcr.io/guizmo-silva/markdown-editor-frontend:latest
    container_name: markdown-editor-frontend
    ports:
      - "3010:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - markdown-editor
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  backend:
    image: ghcr.io/guizmo-silva/markdown-editor-backend:latest
    container_name: markdown-editor-backend
    ports:
      # Bind apenas ao loopback: o backend NÃO fica acessível na rede.
      # O frontend acessa o backend via rede Docker interna.
      - "127.0.0.1:3011:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - PUID=1000
      - PGID=1000
      - WORKSPACE_ROOT=/workspace
      # Volumes adicionais além do workspace principal
      # Formato: nome1:/caminho1,nome2:/caminho2
      # Exemplo: EXTRA_VOLUMES=sda1:/md,docs:/docs
    volumes:
      # Caminho padrão ZimaOS: /DATA/AppData/<nome-do-app>
      - /DATA/AppData/mkd/workspace:/workspace
      # Volumes adicionais (devem coincidir com EXTRA_VOLUMES):
      # - /media/sda1/md:/md
    restart: unless-stopped
    networks:
      - markdown-editor
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  markdown-editor:
    driver: bridge

x-casaos:
  title:
    en_us: MKD
  icon: https://raw.githubusercontent.com/guizmo-silva/markdown-editor/refs/heads/main/docs/logo/mkd-zimaos-icon.png
